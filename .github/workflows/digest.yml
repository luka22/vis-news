name: Daily Vis News Digest

on:
  schedule:
    # Daily 05:00 UTC (07:00 CEST / 06:00 CET)
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip scraping — just redeploy existing docs/'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore seen.db cache
        if: ${{ !inputs.skip_scrape }}
        uses: actions/cache@v4
        with:
          path: data/seen.db
          key: seen-db-${{ github.run_id }}
          restore-keys: seen-db-

      - name: Install dependencies
        if: ${{ !inputs.skip_scrape }}
        run: pip install -r requirements.txt

      - name: Backfill missing English titles
        if: ${{ !inputs.skip_scrape }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/backfill_titles.py

      - name: Run aggregator
        if: ${{ !inputs.skip_scrape }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python main.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
